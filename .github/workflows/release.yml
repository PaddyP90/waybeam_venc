name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Unit tests (gate) ──────────────────────────────────────────────

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: make -C star6e-standalone test

  # ── Cross-compile builds ───────────────────────────────────────────

  build-star6e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Star6E toolchain
        run: make toolchain
      - name: Build Star6E
        run: make build SOC_BUILD=star6e
      - name: Stage Star6E
        run: make stage SOC_BUILD=star6e
      - name: Verify output
        run: test -x star6e-standalone/out/star6e/venc
      - name: Upload Star6E binary
        uses: actions/upload-artifact@v4
        with:
          name: venc-star6e
          path: star6e-standalone/out/star6e/venc

  build-maruko:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Maruko toolchain
        run: make toolchain-maruko
      - name: Build Maruko
        run: make build SOC_BUILD=maruko
      - name: Stage Maruko
        run: make stage SOC_BUILD=maruko
      - name: Verify output
        run: test -x star6e-standalone/out/maruko/venc
      - name: Upload Maruko binary
        uses: actions/upload-artifact@v4
        with:
          name: venc-maruko
          path: star6e-standalone/out/maruko/venc

  # ── Create/update release ──────────────────────────────────────────

  release:
    runs-on: ubuntu-latest
    needs: [build-star6e, build-maruko]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Star6E artifact
        uses: actions/download-artifact@v4
        with:
          name: venc-star6e
          path: release/star6e

      - name: Download Maruko artifact
        uses: actions/download-artifact@v4
        with:
          name: venc-maruko
          path: release/maruko

      - name: Prepare release assets
        run: |
          mv release/star6e/venc release/venc-star6e
          mv release/maruko/venc release/venc-maruko
          chmod +x release/venc-star6e release/venc-maruko

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (v${{ steps.version.outputs.version }})"
          body: |
            Automated build from `master` branch.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}

            ## Binaries

            | File | Backend | SoC |
            |------|---------|-----|
            | `venc-star6e` | Star6E | SSC30KQ / SSC338Q (Infinity6E) |
            | `venc-maruko` | Maruko | SSC378QE (Infinity6C) |

            See [README](https://github.com/${{ github.repository }}/blob/master/README.md) for usage.
          files: |
            release/venc-star6e
            release/venc-maruko
          prerelease: false
          make_latest: true

  # ── Telegram notification (optional) ───────────────────────────────

  notify:
    runs-on: ubuntu-latest
    needs: [release]
    if: vars.TELEGRAM_TOKEN != ''
    steps:
      - name: Send Telegram notification
        env:
          TG_TOKEN: ${{ vars.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ vars.TELEGRAM_CHAT }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d parse_mode=Markdown \
            -d text="✅ *waybeam_venc* release updated%0AVersion: $(cat VERSION)%0ACommit: ${GITHUB_SHA:0:7}"
